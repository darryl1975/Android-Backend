# MySQL DataSource
# Uses the same environment variables as the original .NET project:
#   MYSQL_URL3      - MySQL server hostname (e.g. localhost or 127.0.0.1)
#   MYSQL_USERNAME  - Database username
#   MYSQL_PASSWORD  - Database password
spring.datasource.url=jdbc:mysql://${MYSQL_URL3}/test
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# "update" mirrors EF Core's EnsureCreated/Migrate behavior: creates/updates the schema automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Springdoc OpenAPI / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

# Server port
server.port=5211
